server:
  port: ${PORT:8080}

spring:
  application:
    name: heritage

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:heritage}}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:heritage}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:heritage}}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${SPRING_FLYWAY_URL:${spring.datasource.url}}
    user: ${SPRING_FLYWAY_USER:${spring.datasource.username}}
    password: ${SPRING_FLYWAY_PASSWORD:${spring.datasource.password}}

app:
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:${FRONTEND_ALLOWED_ORIGIN:http://localhost:3000,http://localhost:5173}}
  jwt:
    dev-secret: ${JWT_DEV_SECRET:bG9jYWwtZGV2LW9ubHktand0LXNlY3JldC1oZXJpdGFnZS0yMDI2LWxvbmc=}
    secret: ${JWT_SECRET:${app.jwt.dev-secret}}
    expiration-ms: 86400000 # 24h

management:
  endpoints:
    web:
      exposure:
        include: health