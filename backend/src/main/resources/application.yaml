spring:
  application:
    name: heritage

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dGhpc0lzQVNlY3JldEtleUZvckhlcml0YWdlQXBwMjAyNQ==}
    expiration-ms: 86400000 # 24h

management:
  endpoints:
    web:
      exposure:
        include: health