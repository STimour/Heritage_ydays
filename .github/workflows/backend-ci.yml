name: Backend CI + API Smoke

on:
  push:
    paths:
      - 'backend/**'
      - 'postman/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'postman/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: heritage
          POSTGRES_PASSWORD: heritage
          POSTGRES_DB: heritage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heritage -d heritage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend unit tests
        run: ./mvnw -B test
        working-directory: backend

      - name: Start backend application
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: heritage
          DB_USERNAME: heritage
          DB_PASSWORD: heritage
          JWT_SECRET: thisIsASecretKeyWithAtLeast32CharsForCI
          APP_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          nohup ./mvnw -B spring-boot:run > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"UP"'; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy in time"
          tail -n 200 backend.log || true
          exit 1

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman smoke suite
        run: |
          newman run postman/HeritageYdays.postman_collection.json \
            -e postman/HeritageYdays.postman_environment.example.json \
            --env-var baseUrl=http://localhost:8080 \
            --env-var testUserEmail=ci-user@example.com \
            --env-var testUserPassword='Password123!' \
            --env-var testUserDisplayName='CI User'

      - name: Print backend logs on failure
        if: failure()
        run: tail -n 250 backend.log || true

      - name: Stop backend application
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
